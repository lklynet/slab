<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Kanban Board</title>

    <!-- Tailwind CSS -->
    <!-- <link href="src/output.css" rel="stylesheet" /> -->
    <link href="/css/output.css" rel="stylesheet" />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="https://use.typekit.net/bop8ekr.css" />

    <script>
      // Get API key from environment variable
      window.ENV = {
        API_KEY: "__API_KEY__", // This will be replaced by Cloudflare Pages
      };
    </script>
  </head>
  <body class="bg-gray-950 text-gray-100 font-mono">
    <!-- Main Container -->
    <div class="flex h-screen overflow-hidden bg-gray-900">
      <!-- Sidebar -->
      <div
        id="sidebar"
        class="w-[280px] min-w-[180px] max-w-[450px] bg-gray-800 flex flex-col overflow-hidden resize-x p-4 border-r border-gray-700"
      >
        <!-- Header -->
        <div class="flex items-center p-2 mb-4">
          <div class="relative">
            <button
              id="menu-button"
              class="text-2xl cursor-pointer select-none hover:text-pink-400 transition-colors"
            >
              ☰
            </button>
            <div
              id="dropdown-menu"
              class="hidden absolute top-8 left-0 bg-gray-950 border border-gray-700 rounded shadow-lg z-10 w-48"
            >
              <button
                id="start-new"
                class="w-full px-3 py-2 text-left hover:bg-gray-700 text-sm font-bold"
              >
                Start New
              </button>
              <button
                id="copy-link"
                class="w-full px-3 py-2 text-left hover:bg-gray-700 text-sm font-bold"
              >
                Copy Link
              </button>
              <button
                id="delete-board"
                class="w-full px-3 py-2 text-left hover:bg-gray-700 text-sm font-bold text-red-400"
              >
                Delete
              </button>
            </div>
          </div>
          <div class="flex-1 text-center text-lg font-bold text-blue-400">
            [>_ ] lkly.net
          </div>
          <span
            id="save-status"
            class="w-2 h-2 rounded-full bg-green-400"
          ></span>
        </div>

        <!-- Config Textarea -->
        <textarea
          id="board-config"
          class="flex-1 w-full resize-none border-0 p-4 bg-gray-950 text-gray-100 text-sm mb-4 rounded focus:outline-none focus:ring-1 focus:ring-blue-400"
          placeholder="Enter board configuration..."
        ></textarea>

        <!-- Sidebar Buttons -->
        <div class="flex gap-2 p-2">
          <button
            id="add-column"
            class="flex-1 p-2 bg-gray-700 hover:bg-pink-400 hover:text-gray-950 text-sm font-bold rounded transition-colors"
          >
            <i class="fas fa-plus-square mr-2"></i>Add Column
          </button>
          <button
            id="add-item"
            class="flex-1 p-2 bg-gray-700 hover:bg-pink-400 hover:text-gray-950 text-sm font-bold rounded transition-colors"
          >
            <i class="fas fa-plus mr-2"></i>Add Item
          </button>
        </div>
      </div>

      <!-- Splitter -->
      <div
        id="splitter"
        class="w-2.5 bg-gray-800 cursor-col-resize hover:bg-gray-700 transition-colors"
      ></div>

      <!-- Board Container -->
      <div
        id="board-container"
        class="flex-1 p-5 flex flex-col overflow-hidden bg-gray-900"
      >
        <div
          id="board-title"
          class="text-lg mb-5 text-blue-400 font-bold"
        ></div>
        <div id="board" class="flex-1 flex overflow-x-auto"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
