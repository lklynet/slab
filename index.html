<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Kanban Board</title>

    <!-- Tailwind CSS -->
    <link href="./src/output.css" rel="stylesheet" />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "board-bg": "#0d0d0d",
              "board-text": "#e6e6e6",
              "sidebar-bg": "#1a1a1a",
              "menu-bg": "#262626",
              "menu-hover": "#333333",
              "border-color": "#404040",
              highlight: "#ff6347",
              "save-green": "#32cd32",
              "save-yellow": "#ffd700",
              "save-red": "#ff4500",
            },
          },
        },
      };
    </script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="https://use.typekit.net/bop8ekr.css" />

    <script>
      // Get API key from environment variable
      window.ENV = {
        API_KEY: "__API_KEY__", // This will be replaced by Cloudflare Pages
      };
    </script>
  </head>
  <body class="bg-board-bg text-board-text">
    <!-- Main Container -->
    <div class="flex h-screen overflow-hidden">
      <!-- Sidebar -->
      <div
        id="sidebar"
        class="w-[280px] min-w-[180px] max-w-[450px] bg-sidebar-bg flex flex-col overflow-hidden resize-x p-4"
      >
        <!-- Header -->
        <div class="flex items-center p-2 mb-4">
          <div class="relative">
            <button
              id="menu-button"
              class="text-2xl cursor-pointer select-none"
            >
              ☰
            </button>
            <div
              id="dropdown-menu"
              class="hidden absolute top-8 left-0 bg-menu-bg border border-border-color z-10 w-48"
            >
              <button
                id="start-new"
                class="w-full px-3 py-2 text-left hover:bg-menu-hover text-sm font-bold"
              >
                Start New
              </button>
              <button
                id="copy-link"
                class="w-full px-3 py-2 text-left hover:bg-menu-hover text-sm font-bold"
              >
                Copy Link
              </button>
              <button
                id="delete-board"
                class="w-full px-3 py-2 text-left hover:bg-menu-hover text-sm font-bold"
              >
                Delete
              </button>
            </div>
          </div>
          <div class="flex-1 text-center text-lg font-bold">[>_ ] lkly.net</div>
          <span
            id="save-status"
            class="w-2 h-2 rounded-full bg-save-green"
          ></span>
        </div>

        <!-- Config Textarea -->
        <textarea
          id="board-config"
          class="flex-1 w-full resize-none border-0 p-4 bg-board-bg text-board-text text-sm mb-4"
          placeholder="Enter board configuration..."
        ></textarea>

        <!-- Sidebar Buttons -->
        <div class="flex gap-2 p-2">
          <button
            id="add-column"
            class="flex-1 p-2 bg-menu-bg hover:bg-highlight text-sm font-bold rounded transition-colors"
          >
            <i class="fas fa-plus-square mr-2"></i>Add Column
          </button>
          <button
            id="add-item"
            class="flex-1 p-2 bg-menu-bg hover:bg-highlight text-sm font-bold rounded transition-colors"
          >
            <i class="fas fa-plus mr-2"></i>Add Item
          </button>
        </div>
      </div>

      <!-- Splitter -->
      <div id="splitter" class="w-2.5 bg-sidebar-bg cursor-col-resize"></div>

      <!-- Board Container -->
      <div
        id="board-container"
        class="flex-1 p-5 flex flex-col overflow-hidden"
      >
        <div id="board-title" class="text-lg mb-5"></div>
        <div id="board" class="flex-1 flex overflow-x-auto"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
