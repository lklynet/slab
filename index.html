<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Kanban Board</title>

    <!-- Tailwind CSS -->
    <link href="src/output.css" rel="stylesheet" />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="https://use.typekit.net/bop8ekr.css" />

    <script>
      // Get API key from environment variable
      window.ENV = {
        API_KEY: "__API_KEY__", // This will be replaced by Cloudflare Pages
      };
    </script>
  </head>
  <body class="h-full bg-base text-text font-mono">
    <!-- Main Container -->
    <div class="flex h-screen overflow-hidden">
      <!-- Sidebar -->
      <div
        id="sidebar"
        class="w-[280px] min-w-[180px] bg-mantle flex flex-col overflow-hidden resize-x p-4 border-r border-surface0"
      >
        <!-- Header -->
        <div class="flex items-center p-2 mb-4 gap-2">
          <div class="relative">
            <button
              id="menu-button"
              class="text-xl p-2 hover:bg-surface0 rounded-lg transition-colors"
            >
              <i class="fas fa-bars"></i>
            </button>
            <div
              id="dropdown-menu"
              class="hidden absolute top-10 left-0 bg-mantle border border-surface0 rounded-lg shadow-xl z-10 w-48 divide-y divide-surface0"
            >
              <button
                id="start-new"
                class="w-full px-3 py-2 text-left hover:bg-surface0 text-sm"
              >
                <i class="fas fa-plus mr-2"></i>New Board
              </button>
              <button
                id="copy-link"
                class="w-full px-3 py-2 text-left hover:bg-surface0 text-sm"
              >
                <i class="fas fa-link mr-2"></i>Copy Link
              </button>
              <button
                id="delete-board"
                class="w-full px-3 py-2 text-left hover:bg-surface0 text-rose"
              >
                <i class="fas fa-trash mr-2"></i>Delete
              </button>
            </div>
          </div>
          <div class="flex-1 text-lg font-semibold text-blue">
            <i class="fas fa-trello mr-2"></i>lkly.net
          </div>
          <span id="save-status" class="w-2 h-2 rounded-full bg-green"></span>
        </div>

        <!-- Config Textarea -->
        <textarea
          id="board-config"
          class="flex-1 w-full resize-none p-3 bg-crust text-sm rounded-lg focus:ring-2 focus:ring-blue border-none font-mono placeholder-overlay1"
          placeholder="Enter board configuration..."
        ></textarea>

        <!-- Sidebar Buttons -->
        <div class="flex gap-2 p-2 mt-4">
          <button
            id="add-column"
            class="flex-1 p-2 bg-surface0 hover:bg-mauve text-sm font-medium rounded-lg transition-colors"
          >
            <i class="fas fa-columns mr-2"></i>Add Column
          </button>
          <button
            id="add-item"
            class="flex-1 p-2 bg-surface0 hover:bg-green text-sm font-medium rounded-lg transition-colors"
          >
            <i class="fas fa-plus mr-2"></i>Add Item
          </button>
        </div>
      </div>

      <!-- Splitter -->
      <div
        id="splitter"
        class="w-2.5 bg-[#181825] cursor-col-resize hover:bg-[#313244] transition-colors"
      ></div>

      <!-- Board Container -->
      <div
        id="board-container"
        class="flex-1 flex flex-col overflow-hidden bg-[#1e1e2e]"
      >
        <div
          id="board-title"
          class="text-lg mb-5 text-[#89b4fa] font-bold"
        ></div>
        <div id="board" class="flex-1 flex overflow-x-auto p-4 gap-4"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
