<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Kanban Board</title>

    <!-- Tailwind CSS -->
    <link href="./src/output.css" rel="stylesheet" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              dark: {
                bg: "#0d0d0d",
                text: "#e6e6e6",
                sidebar: "#1a1a1a",
                menu: "#262626",
                hover: "#333333",
                border: "#404040",
              },
              accent: {
                highlight: "#ff6347",
                green: "#32cd32",
                yellow: "#ffd700",
                red: "#ff4500",
              },
            },
          },
        },
      };
    </script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="https://use.typekit.net/bop8ekr.css" />

    <script>
      // Get API key from environment variable
      window.ENV = {
        API_KEY: "__API_KEY__", // This will be replaced by Cloudflare Pages
      };
    </script>
  </head>
  <body class="bg-dark-bg text-dark-text font-mono">
    <!-- Main Container -->
    <div class="flex h-screen overflow-hidden">
      <!-- Sidebar -->
      <div
        id="sidebar"
        class="w-[280px] min-w-[180px] max-w-[450px] bg-dark-sidebar flex flex-col overflow-hidden resize-x p-4"
      >
        <!-- Header -->
        <div class="flex items-center p-2 mb-4">
          <div class="relative">
            <button
              id="menu-button"
              class="text-2xl cursor-pointer select-none hover:text-accent-highlight transition-colors"
            >
              ☰
            </button>
            <div
              id="dropdown-menu"
              class="hidden absolute top-8 left-0 bg-dark-menu border border-dark-border z-10 w-48"
            >
              <button
                id="start-new"
                class="w-full px-3 py-2 text-left hover:bg-dark-hover text-sm font-bold"
              >
                Start New
              </button>
              <button
                id="copy-link"
                class="w-full px-3 py-2 text-left hover:bg-dark-hover text-sm font-bold"
              >
                Copy Link
              </button>
              <button
                id="delete-board"
                class="w-full px-3 py-2 text-left hover:bg-dark-hover text-sm font-bold"
              >
                Delete
              </button>
            </div>
          </div>
          <div class="flex-1 text-center text-lg font-bold">[>_ ] lkly.net</div>
          <span
            id="save-status"
            class="w-2 h-2 rounded-full bg-accent-green"
          ></span>
        </div>

        <!-- Config Textarea -->
        <textarea
          id="board-config"
          class="flex-1 w-full resize-none border-0 p-4 bg-dark-bg text-dark-text text-sm mb-4 focus:outline-none focus:ring-1 focus:ring-accent-highlight"
          placeholder="Enter board configuration..."
        ></textarea>

        <!-- Sidebar Buttons -->
        <div class="flex gap-2 p-2">
          <button
            id="add-column"
            class="flex-1 p-2 bg-dark-menu hover:bg-accent-highlight text-sm font-bold rounded transition-colors"
          >
            <i class="fas fa-plus-square mr-2"></i>Add Column
          </button>
          <button
            id="add-item"
            class="flex-1 p-2 bg-dark-menu hover:bg-accent-highlight text-sm font-bold rounded transition-colors"
          >
            <i class="fas fa-plus mr-2"></i>Add Item
          </button>
        </div>
      </div>

      <!-- Splitter -->
      <div id="splitter" class="w-2.5 bg-dark-sidebar cursor-col-resize"></div>

      <!-- Board Container -->
      <div
        id="board-container"
        class="flex-1 p-5 flex flex-col overflow-hidden"
      >
        <div id="board-title" class="text-lg mb-5"></div>
        <div id="board" class="flex-1 flex overflow-x-auto"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
