<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Kanban Board</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="https://use.typekit.net/bop8ekr.css" />

    <script>
      // Get API key from environment variable
      window.ENV = {
        API_KEY: "__API_KEY__", // This will be replaced by Cloudflare Pages
      };
    </script>
  </head>
  <body>
    <!-- Main Container -->
    <div class="container">
      <!-- Sidebar -->
      <div class="sidebar" id="sidebar">
        <!-- Header inside the sidebar -->
        <div class="header">
          <div class="menu-button" id="menu-button">
            ☰
            <div class="dropdown-menu" id="dropdown-menu">
              <button id="start-new">Start New</button>
              <button id="copy-link">Copy Link</button>
              <button id="clone">Clone</button>
              <button id="delete-board">Delete</button>
            </div>
          </div>
          <div class="app-title">[>_ ] lkly.net</div>
          <span id="save-status" class="save-status"></span>
        </div>
        <textarea
          id="board-config"
          placeholder="Enter board configuration..."
        ></textarea>
        <div class="sidebar-buttons">
          <button id="add-column">
            <i class="fas fa-plus-square"></i> Add Column
          </button>
          <button id="add-item"><i class="fas fa-plus"></i> Add Item</button>
        </div>
      </div>

      <!-- Splitter -->
      <div id="splitter"></div>

      <!-- Board Container -->
      <div id="board-container">
        <div id="board-title"></div>
        <div id="board"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
