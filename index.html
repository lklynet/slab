<!doctype html>
<html lang="en">
  <head>
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-85LBR0M6FY"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-85LBR0M6FY");
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A minimalist Kanban board. Text-driven configuration. Drag-and-drop tasks. Self-hosted."
    />
    <meta name="theme-color" content="#0d0d0d" />
    <meta property="og:title" content="slab" />
    <meta
      property="og:description"
      content="A minimalist Kanban board. Text-driven configuration. Drag-and-drop tasks. Self-hosted."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>"
    />
    <title>slab</title>

    <link href="/css/slab.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="https://use.typekit.net/bop8ekr.css" />
  </head>
  <body>
    <div id="app" role="application" aria-label="Kanban Board">
      <div id="sidebar" role="complementary">
        <div id="header-row">
          <div class="flex" style="position: relative">
            <button
              id="menu-button"
              aria-label="Menu"
              aria-expanded="false"
              aria-controls="dropdown-menu"
            >
              ☰
            </button>
            <div id="dropdown-menu" class="hidden" role="menu">
              <button id="start-new" role="menuitem">Start New</button>
              <button id="copy-link" role="menuitem">Copy Link</button>
              <button id="delete-board" role="menuitem">Delete</button>
            </div>
          </div>
          <div id="app-title">slab</div>
        </div>

        <textarea
          id="board-config"
          placeholder="Enter board configuration..."
          aria-label="Board configuration"
        ></textarea>

        <div id="action-buttons">
          <button id="add-column" class="btn-action">
            <i class="fas fa-plus-square mr-2" aria-hidden="true"></i>Column
          </button>
          <button id="add-item" class="btn-action">
            <i class="fas fa-plus mr-2" aria-hidden="true"></i>Task
          </button>
        </div>
      </div>

      <div id="splitter" role="separator" aria-label="Resize sidebar"></div>

      <div id="board-container" role="main">
        <div id="board-title" role="heading" aria-level="1"></div>
        <div id="board" role="list"></div>
      </div>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
